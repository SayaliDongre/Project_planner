<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Log - Gamified Planner</title>
    <link rel="stylesheet" href="style.css">
    <!-- Canvas Confetti for rewards -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Top Bar: Player Stats & Settings -->
        <header class="glass-panel player-dashboard">
            <div class="player-info">
                <div class="avatar-container">
                    <img id="player-avatar" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/25.gif" alt="Avatar">
                </div>
                <div class="stats">
                    <h1 id="player-title">Level <span id="player-level">1</span>: <span id="player-rank">Novice</span></h1>
                    <div class="xp-bar-container">
                        <div id="xp-bar" class="xp-bar" style="width: 0%;"></div>
                    </div>
                    <p class="xp-text"><span id="current-xp">0</span> / <span id="next-level-xp">100</span> XP</p>
                </div>
            </div>
            
            <div class="project-progress">
                <h2>Overall Quest Progress</h2>
                <div class="progress-bar-bg">
                    <div id="overall-progress-bar" class="progress-bar-fill"></div>
                </div>
                <p id="overall-progress-text">0% Complete</p>
            </div>

            <div class="actions">
                <button id="btn-export" class="btn btn-secondary">💾 Backup JSON</button>
                <label for="file-import" class="btn btn-secondary">📂 Load JSON</label>
                <input type="file" id="file-import" accept=".json" style="display: none;">
                <button id="btn-new-quest" class="btn btn-primary">➕ New Quest</button>
            </div>
        </header>

        <!-- Main Content: Quest Board -->
        <main class="quest-board">
            <div class="quest-column" id="col-active">
                <h2 class="column-title">Active Quests</h2>
                <div class="quest-list" id="active-quests">
                    <!-- Tasks will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- New Quest Modal -->
    <div id="quest-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h2>Create New Quest</h2>
            <form id="new-quest-form">
                <div class="form-group">
                    <label>Quest Title</label>
                    <input type="text" id="q-title" required placeholder="e.g. Defeat the Database Dragon">
                </div>
                <div class="form-group">
                    <label>Severity (Difficulty)</label>
                    <select id="q-severity">
                        <option value="1">Low (Slime)</option>
                        <option value="2">Medium (Goblin)</option>
                        <option value="3">High (Orc)</option>
                        <option value="5">Critical (Boss Fight)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Deadline (Optional)</label>
                    <input type="datetime-local" id="q-deadline">
                </div>
                <div class="form-group">
                    <label>Sub-tasks (Comma separated)</label>
                    <textarea id="q-subtasks" placeholder="e.g. Setup repo, Write API, Test"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="btn-cancel-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Accept Quest</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification system -->
    <div id="notification-container"></div>

    <script src="script.js"></script>
</body>
</html>
